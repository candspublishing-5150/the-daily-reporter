name: Job-Finding Bot

on:
  schedule:
    # Every Monday at 8:00 AM Pacific Time (15:00 UTC)
    - cron: "0 15 * * 1"
  workflow_dispatch: # allow manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer Chrome
        run: npx puppeteer browsers install chrome

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PLANETBIDS_EMAIL: ${{ secrets.PLANETBIDS_EMAIL }}
          PLANETBIDS_PASSWORD: ${{ secrets.PLANETBIDS_PASSWORD }}
        run: npx tsx scraper/index.ts

      - name: Report result
        if: always()
        run: echo "Scraper finished at $(date)"
